name: Publish image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

jobs:
  publish-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        # Full history + tags so `git describe` can resolve a version.
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Compute version
        id: version
        # On a semver tag this is e.g. "v1.2.3"; on main it's the nearest tag
        # plus commits-since and short sha (e.g. "v1.2.3-4-gabc1234"), falling
        # back to the short sha when no tag exists yet.
        run: echo "value=$(git describe --tags --always)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          # main builds -> latest + sha; tag builds (vX.Y.Z) -> X.Y.Z, X.Y, X
          # (semver tags also refresh latest via the default latest=auto flavor).
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            APP_VERSION=${{ steps.version.outputs.value }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
