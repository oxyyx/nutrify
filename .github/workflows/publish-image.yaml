# GitHub Actions pipeline (ported from .woodpecker.yaml).
#
# Builds the single-container image (client + API, see ./Dockerfile) and pushes
# it to GitHub's built-in container registry (ghcr.io) on every push to main.
#
# Published as:
#   ghcr.io/<owner>/<repo>:latest
#   ghcr.io/<owner>/<repo>:<commit-sha>
#
# No manual secret setup is required: the workflow authenticates to ghcr.io with
# the automatically provided GITHUB_TOKEN. Ensure the repository (or org) allows
# GitHub Actions to publish packages — Settings -> Actions -> General ->
# Workflow permissions, or rely on the `packages: write` permission below.

name: Publish image

on:
  push:
    branches:
      - main

jobs:
  publish-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
