# Codeberg CI (Woodpecker) pipeline.
#
# Builds the single-container image (client + API, see ./Dockerfile) and pushes
# it to Codeberg's built-in container registry on every push to main.
#
# Published as:
#   codeberg.org/oxyyx/nutrify:latest
#   codeberg.org/oxyyx/nutrify:<commit-sha>
#
# One-time setup before this runs:
#   1. Create a Codeberg access token (User Settings -> Applications) with the
#      "write:package" scope.
#   2. At https://ci.codeberg.org, open this repo's settings -> Secrets and add
#      a secret named `codeberg_token` with that token as its value.
#   (The registry username is taken automatically from the repo owner.)

when:
  - event: push
    branch: main

steps:
  - name: publish-image
    image: woodpeckerci/plugin-docker-buildx:6.1
    settings:
      registry: codeberg.org
      repo: codeberg.org/${CI_REPO}
      dockerfile: Dockerfile
      platforms: linux/amd64
      tags:
        - latest
        - ${CI_COMMIT_SHA}
      username: ${CI_REPO_OWNER}
      password:
        from_secret: codeberg-woodpecker
